<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Historial de Pasos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f9fc;
    --surface: #ffffff;
    --text: #1a1a2e;
    --text-dim: #7a8099;
    --accent: #534AB7;
    --accent2: #27ae60;
    --border: #e8eaf0;
  }
  html, body {
    width: 100%; min-height: 100%;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    padding: 16px;
  }
  h2 {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 16px;
  }
  .card {
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--border);
    padding: 16px;
    margin-bottom: 14px;
  }
  .card-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .chart-wrap { position: relative; height: 180px; }
  .stats-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 14px;
  }
  .stat-box {
    flex: 1;
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 12px;
    text-align: center;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 500;
    color: var(--accent);
  }
  .stat-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .no-data {
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    padding: 40px 0;
  }
</style>
</head>
<body>

<h2>Últimos 7 días</h2>
<div class="subtitle">Historial de actividad</div>

<div class="stats-row">
  <div class="stat-box">
    <div class="stat-value" id="totalPasos">--</div>
    <div class="stat-label">pasos totales</div>
  </div>
  <div class="stat-box">
    <div class="stat-value" id="promPasos">--</div>
    <div class="stat-label">promedio/día</div>
  </div>
  <div class="stat-box">
    <div class="stat-value" id="mejorDia">--</div>
    <div class="stat-label">mejor día</div>
  </div>
</div>

<div class="card">
  <div class="card-title">Pasos por día</div>
  <div class="chart-wrap">
    <canvas id="chartPasos"></canvas>
  </div>
</div>

<div class="card">
  <div class="card-title">Distancia aproximada (m)</div>
  <div class="chart-wrap">
    <canvas id="chartKm"></canvas>
  </div>
</div>

<script>
// Obtener pasos de la URL
function getParams() {
  const params = new URLSearchParams(window.location.search);
  const pasosStr = params.get('pasos') || '0,0,0,0,0,0,0';
  return pasosStr.split(',').map(v => parseFloat(v) || 0);
}

// Generar etiquetas de los últimos 7 días
function getDayLabels() {
  const dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const labels = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    labels.push(dias[d.getDay()]);
  }
  return labels;
}

const pasos  = getParams();
const labels = getDayLabels();
const km = pasos.map(p => parseFloat((p * 0.75).toFixed(1)));

// Stats
const total  = pasos.reduce((a,b) => a+b, 0);
const prom   = Math.round(total / 7);
const mejor  = Math.max(...pasos);

document.getElementById('totalPasos').textContent = total.toLocaleString();
document.getElementById('promPasos').textContent  = prom.toLocaleString();
document.getElementById('mejorDia').textContent   = mejor.toLocaleString();

const commonOptions = {
  responsive: true,
  maintainAspectRatio: false,
  plugins: { legend: { display: false } },
  scales: {
    x: {
      grid: { display: false },
      ticks: { font: { size: 11, family: 'DM Sans' }, color: '#7a8099' }
    },
    y: {
      grid: { color: '#f0f2f7' },
      ticks: { font: { size: 10, family: 'DM Sans' }, color: '#7a8099' }
    }
  }
};

// Gráfica de pasos
new Chart(document.getElementById('chartPasos'), {
  type: 'line',
  data: {
    labels,
    datasets: [{
      data: pasos,
      borderColor: '#534AB7',
      backgroundColor: 'rgba(83,74,183,0.08)',
      borderWidth: 2.5,
      pointBackgroundColor: '#534AB7',
      pointRadius: 4,
      tension: 0.4,
      fill: true
    }]
  },
  options: commonOptions
});

// Gráfica de km
new Chart(document.getElementById('chartKm'), {
  type: 'line',
  data: {
    labels,
    datasets: [{
      data: m,
      borderColor: '#27ae60',
      backgroundColor: 'rgba(39,174,96,0.08)',
      borderWidth: 2.5,
      pointBackgroundColor: '#27ae60',
      pointRadius: 4,
      tension: 0.4,
      fill: true
    }]
  },
  options: commonOptions
});
</script>
</body>
</html>
