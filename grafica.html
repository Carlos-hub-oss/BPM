<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Historial de Pasos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f9fc; --surface: #ffffff; --text: #1a1a2e;
    --text-dim: #7a8099; --accent: #534AB7; --accent2: #27ae60; --border: #e8eaf0;
  }
  html, body { width:100%; min-height:100%; background:var(--bg); font-family:'DM Sans',sans-serif; color:var(--text); padding:16px; }
  h2 { font-size:16px; font-weight:500; color:var(--text); margin-bottom:4px; }
  .subtitle { font-size:12px; color:var(--text-dim); margin-bottom:16px; }
  .card { background:var(--surface); border-radius:14px; border:1px solid var(--border); padding:16px; margin-bottom:14px; }
  .card-title { font-size:12px; font-weight:500; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; }
  .chart-wrap { position:relative; height:180px; }
  .stats-row { display:flex; justify-content:space-between; gap:10px; margin-bottom:14px; }
  .stat-box { flex:1; background:var(--surface); border-radius:12px; border:1px solid var(--border); padding:12px; text-align:center; }
  .stat-value { font-size:22px; font-weight:500; color:var(--accent); }
  .stat-label { font-size:11px; color:var(--text-dim); margin-top:2px; }

  /* Ticket de impresión (oculto en pantalla) */
  #ticket-print {
    display: none;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    width: 300px;
    margin: 0 auto;
    padding: 12px;
    color: #000;
  }
  #ticket-print .t-title {
    text-align: center;
    font-size: 15px;
    font-weight: bold;
    border-bottom: 1px dashed #000;
    padding-bottom: 6px;
    margin-bottom: 10px;
  }
  #ticket-print .t-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  #ticket-print .t-label { color: #444; }
  #ticket-print .t-value { font-weight: bold; }
  #ticket-print .t-divider {
    border-top: 1px dashed #000;
    margin: 8px 0;
  }
  #ticket-print .t-footer {
    text-align: center;
    font-size: 11px;
    color: #666;
    margin-top: 10px;
  }

  /* Al imprimir: oculta la app, muestra el ticket */
  @media print {
    body > *:not(#ticket-print) { display: none !important; }
    #ticket-print { display: block !important; }
  }
</style>
</head>
<body>

<!-- Ticket (oculto, solo aparece al imprimir) -->
<div id="ticket-print">
  <div class="t-title">📋 Resumen de Salud</div>
  <div class="t-row"><span class="t-label">Fecha:</span><span class="t-value" id="t-fecha">--</span></div>
  <div class="t-divider"></div>
  <div class="t-row"><span class="t-label">Último BPM:</span><span class="t-value" id="t-bpm">--</span></div>
  <div class="t-row"><span class="t-label">IMC:</span><span class="t-value" id="t-imc">--</span></div>
  <div class="t-divider"></div>
  <div class="t-row"><span class="t-label">Pasos totales (7d):</span><span class="t-value" id="t-total">--</span></div>
  <div class="t-row"><span class="t-label">Promedio/día:</span><span class="t-value" id="t-prom">--</span></div>
  <div class="t-row"><span class="t-label">Mejor día:</span><span class="t-value" id="t-mejor">--</span></div>
  <div class="t-divider"></div>
  <div class="t-footer">Proyecto APP · Generado automáticamente</div>
</div>

<!-- Contenido normal de la app -->
<h2>Últimos 7 días</h2>
<div class="subtitle">Historial de actividad</div>

<div class="stats-row">
  <div class="stat-box">
    <div class="stat-value" id="totalPasos">--</div>
    <div class="stat-label">pasos totales</div>
  </div>
  <div class="stat-box">
    <div class="stat-value" id="promPasos">--</div>
    <div class="stat-label">promedio/día</div>
  </div>
  <div class="stat-box">
    <div class="stat-value" id="mejorDia">--</div>
    <div class="stat-label">mejor día</div>
  </div>
</div>

<div class="card">
  <div class="card-title">Pasos por día</div>
  <div class="chart-wrap"><canvas id="chartPasos"></canvas></div>
</div>

<div class="card">
  <div class="card-title">Distancia aproximada (m)</div>
  <div class="chart-wrap"><canvas id="chartKm"></canvas></div>
</div>

<script>
function getParams() {
  const params = new URLSearchParams(window.location.search);
  const pasosStr = params.get('pasos') || '0,0,0,0,0,0,0';
  const bpm      = params.get('bpm')   || '--';
  const imc      = params.get('imc')   || '--';
  return {
    pasos: pasosStr.split(',').map(v => parseFloat(v) || 0),
    bpm,
    imc
  };
}

function getDayLabels() {
  return ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
}

const { pasos, bpm, imc } = getParams();
const labels = getDayLabels();
const metros = pasos.map(p => parseFloat((p * 0.75).toFixed(1)));

const total = pasos.reduce((a,b) => a+b, 0);
const prom  = Math.round(total / 7);
const mejor = Math.max(...pasos);

// Llenar estadísticas visibles
document.getElementById('totalPasos').textContent = total.toLocaleString();
document.getElementById('promPasos').textContent  = prom.toLocaleString();
document.getElementById('mejorDia').textContent   = mejor.toLocaleString();

// Llenar ticket de impresión
const hoy = new Date().toLocaleDateString('es-MX', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
document.getElementById('t-fecha').textContent = hoy;
document.getElementById('t-bpm').textContent   = bpm + ' bpm';
document.getElementById('t-imc').textContent   = imc;
document.getElementById('t-total').textContent = total.toLocaleString();
document.getElementById('t-prom').textContent  = prom.toLocaleString();
document.getElementById('t-mejor').textContent = mejor.toLocaleString();

// Función llamada desde App Inventor
function imprimirTicket() {
  window.print();
}

const commonOptions = {
  responsive: true,
  maintainAspectRatio: false,
  plugins: { legend: { display: false } },
  scales: {
    x: { grid: { display: false }, ticks: { font: { size: 11, family: 'DM Sans' }, color: '#7a8099' } },
    y: { grid: { color: '#f0f2f7' }, beginAtZero: true, ticks: { font: { size: 10, family: 'DM Sans' }, color: '#7a8099' } }
  }
};

new Chart(document.getElementById('chartPasos'), {
  type: 'line',
  data: {
    labels,
    datasets: [{
      data: pasos,
      borderColor: '#534AB7',
      backgroundColor: 'rgba(83,74,183,0.08)',
      borderWidth: 2.5,
      pointBackgroundColor: '#534AB7',
      pointRadius: 4,
      tension: 0.4,
      fill: true
    }]
  },
  options: commonOptions
});

new Chart(document.getElementById('chartKm'), {
  type: 'line',
  data: {
    labels,
    datasets: [{
      data: metros,
      borderColor: '#27ae60',
      backgroundColor: 'rgba(39,174,96,0.08)',
      borderWidth: 2.5,
      pointBackgroundColor: '#27ae60',
      pointRadius: 4,
      tension: 0.4,
      fill: true
    }]
  },
  options: commonOptions
});
</script>
</body>
</html>
